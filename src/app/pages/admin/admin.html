<div class="container mt-5">

    <h2 class="mb-4">Admin Dashboard: Contact Messages</h2>
    
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4>Total Messages: {{ messages.length }}</h4>
      <button class="btn btn-outline-primary btn-sm" (click)="loadMessages()">
        Refresh Data
      </button>
      <button
        class="btn btn-danger btn-sm ms-2"
        (click)="logout()">
        Logout
      </button>
    </div>
    
  
    <div class="table-responsive shadow-sm">
      <table class="table table-hover table-bordered bg-white mb-0">
        <thead class="table-dark">
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Subject</th>
            <th>Message</th>
            <th class="text-center">Action</th>
          </tr>
        </thead>
        
        <tbody>
          @for (msg of messages; track msg.id; let i = $index) {
            <tr>
              <td>{{ i + 1 }}</td>
              <td>{{ msg.name }}</td>
              <td>
                <a href="mailto:{{ msg.email }}">{{ msg.email }}</a>
              </td>
              <td>{{ msg.subject }}</td>
              <td>{{ msg.message }}</td>
              <td class="text-center">
                <button class="btn btn-danger btn-sm" (click)="deleteMessage(msg.id)">
                  Delete
                </button>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="6" class="text-center py-4 text-muted">
                No messages found.
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  
  </div>
