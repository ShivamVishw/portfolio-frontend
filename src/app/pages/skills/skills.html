<section class="container py-5">

    <h2 class="text-center mb-5">Technical Skills</h2>
  
    <div class="row">
  
      <div class="col-md-3">
        <h4 class="text-center mb-3">Backend</h4>
  
        @for(skill of skills.backend; track skill){
          <div class="skill-card">
            {{skill}}
          </div>
        }
      </div>
  
      <div class="col-md-3">
        <h4 class="text-center mb-3">Frontend</h4>
  
        @for(skill of skills.frontend; track skill){
          <div class="skill-card">
            {{skill}}
          </div>
        }
      </div>
  
      <div class="col-md-3">
        <h4 class="text-center mb-3">Database</h4>
  
        @for(skill of skills.database; track skill){
          <div class="skill-card">
            {{skill}}
          </div>
        }
      </div>
  
      <div class="col-md-3">
        <h4 class="text-center mb-3">Tools</h4>
  
        @for(skill of skills.tools; track skill){
          <div class="skill-card">
            {{skill}}
          </div>
        }
      </div>
  
    </div>
  
  </section>
